owner: MBarc
repo: TaskMesh-Status
userAgent: TaskMesh-Status

url: https://status.taskmesh.co
baseUrl: /

logo: https://taskmesh.co/taskmesh-logo.svg

sites:
  - name: Website
    url: https://taskmesh.co
    expectedStatusCodes:
      - 200

  - name: Licensing API
    url: https://taskmesh.co/api/billing/health
    expectedStatusCodes:
      - 200
      - 204

  - name: Marketplace
    url: https://taskmesh.co/marketplace
    expectedStatusCodes:
      - 200

  - name: Update Delivery
    url: https://api.github.com/repos/MBarc/TaskMesh/releases/latest
    expectedStatusCodes:
      - 200

  - name: Billing
    url: https://api.stripe.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: Support Portal
    url: https://support.taskmesh.co
    expectedStatusCodes:
      - 200

  - name: Discord Community
    url: https://discord.com/api/v10/gateway
    expectedStatusCodes:
      - 200

status-website:
  cname: status.taskmesh.co
  name: TaskMesh Status
  introTitle: TaskMesh Service Status
  introMessage: >
    Real-time status and incident history for TaskMesh hosted services.
    Self-hosted users can always access their local installation regardless
    of the status of these services.
  navbar:
    - title: taskmesh.co
      href: https://taskmesh.co
    - title: Changelog
      href: https://taskmesh.co/changelog
    - title: Contact
      href: https://taskmesh.co/contact

i18n:
  language: en

schedule: "@every 5m"
